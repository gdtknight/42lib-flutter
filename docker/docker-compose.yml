version: '3.8'

services:
  # PostgreSQL Database
  postgres-db:
    image: postgres:16-alpine
    container_name: 42lib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_DB: library_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis-cache:
    image: redis:7-alpine
    container_name: 42lib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: 42lib-backend
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/node_modules
      - ../backend/logs:/app/logs
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://library_user:library_pass@postgres-db:5432/library_db?schema=public
      - PORT=3000
    env_file:
      - ../backend/.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Flutter Development Environment
  flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile.flutter
    container_name: 42lib-flutter-dev
    depends_on:
      - backend-api
    volumes:
      - ..:/app
      - flutter_pub_cache:/root/.pub-cache
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    environment:
      - FLUTTER_HOME=/opt/flutter
      - PATH=/opt/flutter/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - API_BASE_URL=http://backend-api:3000/api/v1
    command: >
      bash -c "
        echo '📦 Installing Flutter dependencies...'
        flutter pub get &&
        echo '🚀 Starting Flutter Web Server on port 8080...'
        echo '🌐 Access at: http://localhost:8080'
        flutter run -d web-server --web-hostname=0.0.0.0 --web-port=8080
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  flutter_pub_cache:
    driver: local
