name: lib_42_flutter
description: 42 Learning Space Library Management System - Flutter App
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.4.0
  
  # Authentication
  oauth2: ^2.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  
  # UI & Images
  cached_network_image: ^3.3.0
  
  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2
  json_annotation: ^4.8.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Testing
  bloc_test: ^9.1.5
  mockito: ^5.4.4
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^3.0.1

# Transitive dep override: win32 5.2.0 (pinned via flutter_secure_storage_windows)
# uses UnmodifiableUint8ListView (removed in Dart 3.5). Need ≥5.5.0.
# But win32 5.10+ requires Dart 3.6+ language level (Flutter 3.24 = Dart 3.5).
# Pin to range compatible with Dart 3.5: 5.5.x ~ 5.9.x.
# See: https://github.com/gdtknight/42lib-flutter/issues/67
dependency_overrides:
  win32: '>=5.5.0 <5.10.0'

flutter:
  uses-material-design: true
  
  # 42 brand assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
