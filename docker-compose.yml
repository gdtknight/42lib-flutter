version: '3.8'

services:
  flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 42lib-flutter-dev
    volumes:
      - .:/workspace
      - flutter-pub-cache:/root/.pub-cache
      - flutter-gradle-cache:/root/.gradle
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - FLUTTER_ROOT=/opt/flutter
      - PUB_CACHE=/root/.pub-cache
    ports:
      # Flutter Web 개발 서버
      - "8080:8080"
      # Flutter DevTools
      - "9100:9100"
    command: /bin/bash

volumes:
  flutter-pub-cache:
    name: 42lib-flutter-pub-cache
  flutter-gradle-cache:
    name: 42lib-flutter-gradle-cache
