name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  analyze:
    name: 코드 분석
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 코드 분석
        run: flutter analyze --no-fatal-infos
      
      - name: 포맷 검사
        run: |
          dart format . > /tmp/format-output.txt 2>&1 || true
          if ! dart format --set-exit-if-changed . ; then
            echo "❌ 포맷 오류 발생. 다음 파일들이 수정되었습니다:"
            dart format --set-exit-if-changed . 2>&1 | grep "Formatted" || true
            git diff
            exit 1
          fi

  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 단위 테스트
        run: flutter test --coverage
      
      - name: 커버리지 업로드
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  # Android/iOS 빌드는 MVP 완성 후 활성화 (Constitution v1.10.0)
