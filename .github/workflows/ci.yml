name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  analyze:
    name: 코드 분석
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 코드 분석
        run: flutter analyze --no-fatal-infos
      
      - name: 포맷 검사
        run: |
          dart format . > /tmp/format-output.txt 2>&1 || true
          if ! dart format --set-exit-if-changed . ; then
            echo "❌ 포맷 오류 발생. 다음 파일들이 수정되었습니다:"
            dart format --set-exit-if-changed . 2>&1 | grep "Formatted" || true
            git diff
            exit 1
          fi

  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 단위 테스트
        run: flutter test --coverage
      
      - name: 커버리지 업로드
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  # Android/iOS 빌드: v0.2.0 MVP 릴리스 후 활성화 (Constitution v1.10.0).
  # 태그 푸시 시에만 실행하여 PR/일반 푸시 피드백 시간을 보호.

  build-android:
    name: Android 빌드
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: Android APK 빌드
        run: flutter build apk --release

      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS 빌드
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: iOS 빌드 (서명 없이)
        run: flutter build ios --release --no-codesign

  build-web:
    name: Web 빌드
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: Web 빌드
        run: flutter build web --release
      
      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
