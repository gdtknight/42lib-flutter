name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  analyze:
    name: 코드 분석
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 코드 분석
        run: flutter analyze --no-fatal-infos
      
      - name: 포맷 검사
        run: dart format --set-exit-if-changed .

  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: 단위 테스트
        run: flutter test --coverage
      
      - name: 커버리지 업로드
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  build-android:
    name: Android 빌드
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: Android APK 빌드
        run: flutter build apk --release
      
      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS 빌드
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: iOS 빌드 (서명 없이)
        run: flutter build ios --release --no-codesign

  build-web:
    name: Web 빌드
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: Web 빌드
        run: flutter build web --release
      
      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: build/web/
