  build-web:
    name: Web 빌드
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 의존성 설치
        run: flutter pub get
      
      - name: Web 빌드
        run: flutter build web --release
      
      - name: 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
